name: Build and Push Java App Image to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: saki-ecs-cicd-lab
  IMAGE_NAME: ekowniisakisackey_ecsjavaapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::593793048595:role/saki-github-ecr-push-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_NAME .

      - name: Tag Docker image for ECR
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_NAME ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_NAME

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_NAME

      - name: Prepare deployment files
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_NAME }}

          sed "s|IMAGE_URI_PLACEHOLDER|$IMAGE_URI|g; s|EXECUTION_ROLE_ARN_PLACEHOLDER|arn:aws:iam::593793048595:role/saki-ecs-cicd-lab-stack-TaskExecutionRole-FteUyH0E48OM|g" taskdef.json > taskdef.json.rendered
          mv taskdef.json.rendered taskdef.json

      - name: Create deployment bundle
        run: |
          zip deployment-artifact.zip appspec.yaml taskdef.json

      - name: Upload deployment bundle to S3 for CodePipeline
        run: |
          aws s3 cp deployment-artifact.zip s3://saki-ecs-cicd-lab-stack-codepipelineartifactbucket-dsqrsl33sshg/placeholder.zip
